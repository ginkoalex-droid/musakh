events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream backend {
        server backend:8000;
    }

    upstream frontend {
        server frontend:80;
    }

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name dr-cycle.cc www.dr-cycle.cc;
        return 301 https://dr-cycle.cc$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name dr-cycle.cc www.dr-cycle.cc;

        ssl_certificate     /etc/letsencrypt/live/dr-cycle.cc/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/dr-cycle.cc/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 10M;

        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
